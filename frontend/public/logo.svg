<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>

  <!-- ICON: The Connected 'G' -->
  <g transform="translate(5, 5) scale(0.85)">
    <path d="M 86,39 A 30,30 0 1,0 86,81" fill="none" stroke="url(#blueGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 55,60 L 86,60 L 86,81" fill="none" stroke="url(#mintGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="55" cy="60" r="6" fill="#10B981" />
  </g>

  <!-- GIGLIGO uppercase -->
  <text x="100" y="58" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="40" font-weight="900" fill="#1E293B" letter-spacing="4">GIGLIGO</text>
</svg>
